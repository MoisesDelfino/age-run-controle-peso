<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Age Run</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css?v=2026052206">
    <link rel="stylesheet" href="auth.css?v=2026052206">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="logo.png" alt="Age Run" class="auth-logo">
                <h1>Controle de peso</h1>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="senha" placeholder="Digite sua senha" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                            <span class="material-icons eye-icon">visibility_off</span>
                        </button>
                    </div>
                </div>
                
                <div class="forgot-password">
                    <a href="/recuperar-senha">Esqueci minha senha</a>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span>Entrar</span>
                </button>
                
                <div id="message" class="message"></div>
            </form>
            
            <div class="auth-footer">
                <p>Ainda não tem conta? <a href="/cadastro">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

    <script src="theme.js?v=2026052203"></script>
    <script src="auth.js?v=2026052039"></script>
</body>
</html>
