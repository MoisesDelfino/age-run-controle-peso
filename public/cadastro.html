<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Age Run</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css?v=2026052039">
    <link rel="stylesheet" href="auth.css?v=2026052039">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="logo.png" alt="Age Run" class="auth-logo">
                <h1>Junte-se ao Age Run!</h1>
                <p>Crie sua conta e comece a acompanhar sua evolução</p>
            </div>
            
            <form id="cadastroForm" class="auth-form">
                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" minlength="6">
                        <button type="button" class="toggle-password" aria-label="Mostrar senha">
                            <span class="material-icons eye-icon">visibility_off</span>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar senha:</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmarSenha" placeholder="Digite a senha novamente" required autocomplete="new-password">
                        <button type="button" class="toggle-password" aria-label="Mostrar senha">
                            <span class="material-icons eye-icon">visibility_off</span>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span>Criar Conta</span>
                </button>
                
                <div id="message" class="message"></div>
            </form>
            
            <div class="auth-footer">
                <p>Já tem uma conta? <a href="/login">Faça login aqui</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js?v=2026052039"></script>
</body>
</html>
