<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Age Run</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css?v=2026052203">
    <link rel="stylesheet" href="auth.css?v=2026052203">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="logo.png" alt="Age Run" class="auth-logo">
                <h1>Recuperar Senha</h1>
            </div>
            
            <!-- Etapa 1: Solicitar código -->
            <div id="etapa1" class="auth-form">
                <p class="info-text">Digite seu e-mail cadastrado para receber o código de recuperação.</p>
                
                <form id="solicitarCodigoForm">
                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <span>Enviar Código</span>
                    </button>
                </form>
                
                <div id="message1" class="message"></div>
            </div>

            <!-- Etapa 2: Inserir código e nova senha -->
            <div id="etapa2" class="auth-form" style="display: none;">
                <div id="codigoExibicao" class="codigo-exibicao"></div>
                
                <form id="redefinirSenhaForm">
                    <div class="form-group">
                        <label for="codigo">Código de Recuperação:</label>
                        <input type="text" id="codigo" placeholder="Digite o código de 6 dígitos" required maxlength="6" pattern="[0-9]{6}">
                    </div>
                    
                    <div class="form-group">
                        <label for="novaSenha">Nova Senha:</label>
                        <input type="password" id="novaSenha" placeholder="Digite sua nova senha" required minlength="6" autocomplete="new-password">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmarSenha">Confirmar Senha:</label>
                        <input type="password" id="confirmarSenha" placeholder="Confirme sua nova senha" required minlength="6" autocomplete="new-password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <span>Redefinir Senha</span>
                    </button>
                </form>
                
                <div id="message2" class="message"></div>
            </div>
            
            <div class="auth-footer">
                <p><a href="/login">← Voltar para o login</a></p>
            </div>
        </div>
    </div>

    <script src="theme.js?v=2026052203"></script>
    <script src="recuperar-senha.js"></script>
</body>
</html>
