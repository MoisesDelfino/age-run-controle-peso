<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <defs>
    <style>
      .logo-bg {
        fill: white;
        rx: 15;
      }
      .logo-text {
        font-family: Arial, sans-serif;
        font-size: 180px;
        font-weight: bold;
        fill: #8BC34A;
        letter-spacing: -5px;
      }
      .logo-shadow {
        font-family: Arial, sans-serif;
        font-size: 180px;
        font-weight: bold;
        fill: #7B1FA2;
        letter-spacing: -5px;
        opacity: 0.3;
      }
    </style>
  </defs>
  <!-- Fundo branco arredondado -->
  <rect class="logo-bg" x="50" y="30" width="500" height="190" rx="20"/>
  <!-- Sombra roxa -->
  <text x="50%" y="68%" dominant-baseline="middle" text-anchor="middle" class="logo-shadow">age</text>
  <!-- Texto principal verde -->
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" class="logo-text">age</text>
</svg>
