name: 🔒 Backup Automático Diário

on:
  schedule:
    # Executa todo dia às 2h da manhã (UTC) = 23h (Brasília)
    - cron: '0 2 * * *'
  
  # Permite executar manualmente via GitHub Actions
  workflow_dispatch:

permissions:
  contents: write  # Necessário para fazer push dos backups

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 📦 Instalar dependências
        run: npm ci
      
      - name: 💾 Executar backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run backup
      
      - name: 📊 Verificar backup
        run: |
          echo "📋 Backups criados:"
          ls -lh backups/backup-latest.json
          echo ""
          echo "📈 Estatísticas:"
          cat backups/backup-latest.json | grep -A 5 '"stats"'
      
      - name: 📝 Commit e Push
        run: |
          git config user.name "Backup Bot"
          git config user.email "backup@agerun.com"
          git add backups/
          
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma mudança para commitar (backup idêntico ao anterior)"
          else
            git commit -m "🔒 Backup automático: $(date +'%d/%m/%Y %H:%M')"
            git push
            echo "✅ Backup commitado e enviado ao GitHub!"
          fi
      
      - name: ✅ Notificar sucesso
        if: success()
        run: |
          echo "✅ Backup concluído com sucesso!"
          echo "📅 Data: $(date)"
          echo "🔗 Repositório: ${{ github.repository }}"
